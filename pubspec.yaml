name: iot_home_automation
description: IoT Home Automation App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: 6.2.1
  flutter_blue_plus: ^1.32.12   # ← ADDED for BLE connectivity
  cloud_firestore: ^6.2.0
  mqtt_client: ^10.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#5E60CE"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo.png

